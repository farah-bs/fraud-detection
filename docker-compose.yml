services:

  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${PG_DB}
      POSTGRES_USER:     ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASS}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Neo4j ───────────────────────────────────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER}/${NEO4J_PASS}
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*"
    ports:
      - "7474:7474"   # Neo4j Browser (UI)
      - "7687:7687"   # Bolt (driver)
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # ── Entraînement ────────────────────────────────────────────────────────────
  # Service one-shot : tourne une fois, génère les données, entraîne le modèle,
  # puis s'arrête. Le fichier .pt est écrit dans le volume partagé "model_store".
  train:
    build:
      context: .
      dockerfile: Dockerfile.train
    env_file: .env
    environment:
      PG_HOST_TRAIN:    postgres
      NEO4J_URI:  bolt://neo4j:7687
      MODEL_PATH: /app/model/gnn_fraud_detector.pt
    volumes:
      - model_store:/app/model
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    # restart: "no" par défaut pour un service one-shot
    profiles:
      - train   # lancé uniquement avec : docker compose --profile train up train

  # ── API d'inférence ─────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    environment:
      PG_HOST_TRAIN:    postgres
      NEO4J_URI:  bolt://neo4j:7687
      MODEL_PATH: /app/model/gnn_fraud_detector.pt
    ports:
      - "${API_PORT:-8000}:8000"
    volumes:
      - model_store:/app/model   # lit le .pt produit par le service train
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  neo4j_data:
  model_store:   # volume partagé entre train et api
